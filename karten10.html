<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blitzkarten: В парикмахерской</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #718096;
            --bg-color: #f7fafc;
            --card-front-bg: #ffffff;
            --card-back-bg: #ebf8ff;
            --text-color: #2d3748;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 15px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .instruction {
            text-align: center;
            font-size: 0.9rem;
            color: var(--secondary-color);
            margin-bottom: 20px;
        }

        /* Das Karten-Raster */
        .flashcard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            perspective: 1000px; /* Ermöglicht 3D-Effekt */
        }

        /* Die einzelne Karte */
        .card {
            height: 150px;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        /* Vorder- und Rückseite */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 2px solid #e2e8f0;
            font-weight: bold;
            box-sizing: border-box;
        }

        .card-front {
            background-color: var(--card-front-bg);
            color: var(--primary-color);
            font-size: 1.2rem;
        }

        .card-back {
            background-color: var(--card-back-bg);
            color: var(--text-color);
            transform: rotateY(180deg);
            font-size: 1.1rem;
            border-color: var(--primary-color);
        }

        /* Fortschritt und Steuerung */
        .controls {
            margin-top: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .info-bar {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            color: var(--secondary-color);
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        .btn-toggle { background-color: var(--secondary-color); color: white; }
        .btn-reset { background-color: #e2e8f0; color: var(--text-color); }

        /* Mobile Anpassungen */
        @media (max-width: 480px) {
            .flashcard-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
            .card { height: 120px; }
            .card-front { font-size: 1rem; }
            .card-back { font-size: 0.9rem; }
            h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Карточки: В парикмахерской</h1>
    <p class="instruction">Klicke auf die Karten, um sie umzudrehen.</p>

    <div class="info-bar" id="progress">Gelernt: 0 / 0</div>

    <div class="flashcard-grid" id="card-grid">
        <!-- Karten werden per JS geladen -->
    </div>

    <div class="controls">
        <button class="btn-toggle" onclick="flipAll()">Alle umdrehen</button>
        <button class="btn-reset" onclick="initCards()">Neu mischen</button>
    </div>
</div>

<script>
    const vocabulary = [
        { ru: "парикмахерская", de: "Friseursalon" },
        { ru: "парикмахер", de: "Friseur" },
        { ru: "стрижка", de: "Haarschnitt" },
        { ru: "стричь волосы", de: "Haare schneiden" },
        { ru: "кончики", de: "Spitzen" },
        { ru: "чёлка", de: "Pony" },
        { ru: "красить волосы", de: "Haare färben" },
        { ru: "окрашивание", de: "Färbung" },
        { ru: "мыть голову", de: "Haare waschen" },
        { ru: "укладка", de: "Styling" },
        { ru: "локоны", de: "Locken" },
        { ru: "выпрямление", de: "Glättung" },
        { ru: "шампунь", de: "Shampoo" },
        { ru: "ножницы", de: "Schere" },
        { ru: "фен", de: "Föhn" },
        { ru: "зеркало", de: "Spiegel" }
    ];

    let allFlipped = false;

    function initCards() {
        const grid = document.getElementById('card-grid');
        grid.innerHTML = "";
        allFlipped = false;

        // Mischen
        const shuffled = [...vocabulary].sort(() => Math.random() - 0.5);

        shuffled.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-face card-front">${item.ru}</div>
                <div class="card-face card-back">${item.de}</div>
            `;
            card.onclick = () => {
                card.classList.toggle('flipped');
                updateProgress();
            };
            grid.appendChild(card);
        });
        updateProgress();
    }

    function updateProgress() {
        const total = vocabulary.length;
        const flipped = document.querySelectorAll('.card.flipped').length;
        document.getElementById('progress').innerText = `Gelernt: ${flipped} / ${total}`;
    }

    function flipAll() {
        const cards = document.querySelectorAll('.card');
        allFlipped = !allFlipped;
        cards.forEach(card => {
            if (allFlipped) {
                card.classList.add('flipped');
            } else {
                card.classList.remove('flipped');
            }
        });
        updateProgress();
    }

    // Erster Start
    initCards();
</script>

</body>
</html>
